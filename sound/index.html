<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Акустический тестер</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-primary: #ffffff;
            --text-secondary: #666666;
            --accent-color: #A855F7; /* Стильный фиолетовый */
            --accent-glow: rgba(168, 85, 247, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            pointer-events: none;
        }

        .header {
            position: absolute;
            top: 32px;
            text-align: center;
            pointer-events: auto;
            width: 100%;
        }

        .header h1 {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .warning {
            font-size: 0.75rem;
            color: var(--text-secondary);
            border-left: 2px solid var(--accent-color);
            padding-left: 12px;
            text-align: left;
            display: inline-block;
            line-height: 1.4;
        }

        .controls {
            width: 100%;
            pointer-events: auto;
            margin-bottom: 48px;
        }

        .freq-display {
            font-family: 'SF Mono', 'Fira Code', 'Roboto Mono', monospace;
            font-size: 4rem;
            font-weight: 300;
            text-align: center;
            margin-bottom: 4px;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        .freq-display span {
            font-size: 1.5rem;
            color: var(--accent-color);
            font-weight: 500;
            margin-left: 4px;
        }

        .freq-label {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            letter-spacing: 0.05em;
        }

        .slider-container {
            margin-bottom: 40px;
            padding: 0 8px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 15px var(--accent-glow);
            border: 2px solid var(--bg-color);
            transition: transform 0.1s ease, box-shadow 0.2s ease;
        }

        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.2);
            box-shadow: 0 0 25px var(--accent-color);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #222222;
            border-radius: 2px;
        }

        input[type=range]:focus {
            outline: none;
        }

        .test-btn {
            width: 100%;
            padding: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--accent-color);
            background: transparent;
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            cursor: pointer;
            touch-action: none;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .test-btn:active, .test-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 30px var(--accent-glow);
            transform: scale(0.98);
        }

        .test-btn span {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 6px;
            letter-spacing: 0.05em;
            text-transform: none;
        }
    </style>
  <script type="module" crossorigin src="./assets/index-B1zFdrf4.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div class="header">
            <h1>Акустический тестер</h1>
            <div class="warning">
                Начните с низкой громкости устройства.<br>
                Высокие частоты могут повредить слух или динамики.
            </div>
        </div>

        <div class="controls">
            <div class="freq-display" id="freqDisplay">1000<span>Гц</span></div>
            <div class="freq-label">20 Гц — 20 000 Гц (Логарифмическая шкала)</div>
            
            <div class="slider-container">
                <input type="range" id="freqSlider" min="0" max="1000" value="138">
            </div>

            <button class="test-btn" id="testBtn">
                Зажмите для теста
                <span>Отпустите для плавного затухания</span>
            </button>
        </div>
    </div>

</body>
</html>
