<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,shrink-to-fit=no">
    <title>Cinematic Terminal</title>
	<link type="text/css" rel="stylesheet" href="styles.css" media="all" />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Фоновые звёзды -->
    <div class="stars" id="stars"></div>

    <!-- Логотип и терминал -->
    <img src="logo.png" alt="Logo" class="logo">
	<div class="loading-bar-container">
    <div class="loading-bar"></div>
    <div class="status-text">> LOADING: 0%</div>
    </div>
    <div class="crt-screen" id="portfolio">
	    <h1>ЗАПУСК СИСТЕМЫ:</h1>
        <div class="scanlines"></div>
        <div class="noise"></div>
    </div>

<script>
    // Основные параметры
    const CONFIG = {
        STARS_COUNT: 150,
        TEXT_SPEED: 25,
        FADE_IN_DURATION: 1000,
        FADE_OUT_DURATION: 1100,
        LINE_PAUSE: 250,
        LOADING_SPEED: 1.5,
        UPDATE_INTERVAL: 50,
        SHAKE_INTENSITY: 4,
        BEEP_FREQUENCY_RANGE: 200,
        BEEP_DURATION: 100,
        WARNING_CHANCE: 0.95,
        WARNING_DURATION: 900,
        WARNING_COLOR: '#FF4136',
        NORMAL_COLOR: '#00FF00',
        FINAL_MESSAGE: '> SYSTEM COMPROMISED',
        FINAL_BAR_COLOR: '#FF4136',
        FINAL_BORDER_COLOR: '#FF0000',
        LINES: [
            "> Проверка оперативной памяти: [ОШИБКА]",
            "> Загрузка bios: 0xFF34... [НЕИЗВЕСТНЫЙ СБОЙ]",
            "> Сканирование: [СИГНАЛЫ ЖИЗНИ ОТСУТСТВУЮТ]",
            "> Протокол: Активирована система самоуничтожения!",
        ],
        REDIRECT_URL: "portfolio.html"
    };

    // Модуль для создания звёзд
    const createStars = (container, count = 32) => {
        for (let i = 0; i < count; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.top = `${Math.random() * 100}vh`;
            star.style.left = `${Math.random() * 100}vw`;
            star.style.animationDelay = `${Math.random() * 3}s`;
            container.appendChild(star);
        }
    };

    // Модуль для печати текста с эффектом перебора символов
    const typeText = async (element, text, speed = 50) => {
        return new Promise((resolve) => {
            const randomChars = "!@#$%^&*()_+-=[]{}|;:,.<>?~`";
            let currentText = '';
            let charIndex = 0;

            const interval = setInterval(() => {
                if (charIndex < text.length) {
                    let tempText = currentText;
                    tempText += text[charIndex];
                    for (let i = charIndex + 1; i < text.length; i++) {
                        tempText += randomChars[Math.floor(Math.random() * randomChars.length)];
                    }
                    element.textContent = tempText;
                    currentText += text[charIndex];
                    charIndex++;
                } else {
                    clearInterval(interval);
                    resolve();
                }
            }, speed);
        });
    };

    // Модуль для плавного появления
    const fadeIn = (element, duration = 500) => {
        return new Promise((resolve) => {
            element.style.opacity = 0;
            let start = null;

            const step = (timestamp) => {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                element.style.opacity = Math.min(progress / duration, 1);
                if (progress < duration) {
                    requestAnimationFrame(step);
                } else {
                    resolve();
                }
            };
            requestAnimationFrame(step);
        });
    };

    // Модуль для плавного исчезновения
    const fadeOut = (element, duration = 500) => {
        return new Promise((resolve) => {
            let start = null;

            const step = (timestamp) => {
                if (!start) start = timestamp;
                const progress = timestamp - start;
                element.style.opacity = Math.max(1 - progress / duration, 0);
                if (progress < duration) {
                    requestAnimationFrame(step);
                } else {
                    resolve();
                }
            };
            requestAnimationFrame(step);
        });
    };

    // Модуль для имитации прогресс-бара
    const simulateLoading = async (progressCallback) => {
        const bar = document.querySelector('.loading-bar');
        const container = document.querySelector('.loading-bar-container');
        const statusText = document.querySelector('.status-text');
        let progress = 0;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const playBeep = (frequency, duration) => {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = frequency;
            gainNode.gain.value = 0.1;
            oscillator.start();
            setTimeout(() => oscillator.stop(), duration);
        };

        return new Promise((resolve) => {
            const loading = setInterval(() => {
                progress += Math.random() * CONFIG.LOADING_SPEED;
                if (progress > 100) progress = 100;

                bar.style.width = `${progress}%`;
                statusText.textContent = `> LOADING: ${Math.floor(progress)}%`;


                if (progress > 40 && Math.random() > CONFIG.WARNING_CHANCE) {
                    statusText.style.color = CONFIG.WARNING_COLOR;
                    statusText.textContent = '> CONTAINMENT BREACH';
                    setTimeout(() => {
                        statusText.style.color = CONFIG.NORMAL_COLOR;
                        statusText.textContent = `> LOADING: ${Math.floor(progress)}%`;
                    }, CONFIG.WARNING_DURATION);
                }

                if (progress >= 100) {
                    clearInterval(loading);
                    statusText.textContent = CONFIG.FINAL_MESSAGE;
                    bar.style.background = CONFIG.FINAL_BAR_COLOR;
                    container.style.border = `1px solid ${CONFIG.FINAL_BORDER_COLOR}`;
                    playBeep(300, 500);
                    resolve();
                }

                // Вызываем колбэк для обновления прогресса
                if (progressCallback) {
                    progressCallback(progress);
                }
            }, CONFIG.UPDATE_INTERVAL);
        });
    };

    // Основная функция
    const init = async () => {
        const starsContainer = document.getElementById('stars');
        const portfolio = document.getElementById('portfolio');
        const logo = document.querySelector('.logo');

        // Создаём звёзды
        createStars(starsContainer, CONFIG.STARS_COUNT);

        // Плавное появление логотипа
        if (logo) {
            await fadeIn(logo, CONFIG.FADE_IN_DURATION);
        }

        // Прогресс-бар и печать текста
        let currentProgress = 0;
        const progressPerLine = 100 / CONFIG.LINES.length;

        // Запускаем прогресс-бар и печать текста одновременно
        const loadingPromise = simulateLoading((progress) => {
            currentProgress = progress;
        });

        for (const line of CONFIG.LINES) {
            const lineElement = document.createElement('div');
            lineElement.classList.add('portfolio-line');
            portfolio.appendChild(lineElement);
            await typeText(lineElement, line, CONFIG.TEXT_SPEED);

            // Увеличиваем прогресс на случайное значение в пределах progressPerLine
            const randomProgress = progressPerLine * (0.8 + Math.random() * 0.4); // Добавляем рандом
            currentProgress = Math.min(currentProgress + randomProgress, 100);
            await new Promise((resolve) => setTimeout(resolve, CONFIG.LINE_PAUSE));
        }

        // Ждём завершения прогресс-бара
        await loadingPromise;

        // Плавное исчезновение логотипа и текста
        await fadeOut(portfolio, CONFIG.FADE_OUT_DURATION);

        // Переход на portfolio.html
        window.location.href = CONFIG.REDIRECT_URL;
    };

    // Запуск
    init();
</script>

</body>
</html>
